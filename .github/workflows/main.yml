name: Daily Taiwan Stock Scraper

on:
  schedule:
    - cron: '30 8 * * 1-5' 
  # 允許手動觸發，並增加一個接收「目標日期」的欄位
  workflow_dispatch:
    inputs:
      target_date:
        description: '要抓取的特定日期 (格式: YYYY/MM/DD，留白則抓取最新)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-and-scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    # 修改這裡：把接收到的日期變數傳給 Python 執行
    - name: Run the scraper
      run: python scraper.py "${{ github.event.inputs.target_date }}"

    - name: Commit and Push Data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add stock_data.json
        git diff-index --quiet HEAD || git commit -m "Auto-update stock data"
        git push
