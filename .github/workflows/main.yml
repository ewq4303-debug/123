name: Daily Taiwan Stock Scraper

on:
  # 允許手動點擊按鈕執行
  workflow_dispatch: 
  
  # 設定排程自動執行 (平日台灣時間 16:30)
  schedule:
    - cron: '30 8 * * 1-5' 

jobs:
  build-and-scrape:
    runs-on: ubuntu-latest

    steps:
    # 步驟 1：把您的程式碼載入到雲端機器中
    - name: Checkout repository
      uses: actions/checkout@v4

    # 步驟 2：安裝 Python 環境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 步驟 3：直接在這裡安裝需要的套件 (您截圖中的部分)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    # 步驟 4：執行您的爬蟲程式
    - name: Run the scraper
      run: python scraper.py
