<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股 2330 籌碼儀表板</title>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --card: #ffffff; --text: #334155; --border: #e2e8f0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: #1e293b; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-title { margin-top: 0; font-size: 1.2rem; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        .form-group { display: inline-block; margin-right: 15px; margin-bottom: 10px; }
        label { font-weight: bold; margin-right: 5px; font-size: 0.9rem;}
        input { padding: 8px; border: 1px solid var(--border); border-radius: 5px; outline: none; }
        input:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 9px 18px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #1d4ed8; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; white-space: nowrap; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: right; }
        th { background: #f8fafc; color: #475569; text-align: center; font-weight: 600; }
        td:first-child { text-align: center; font-weight: bold; } 
        tr:nth-child(even) { background: #f8fafc; }
        tr:hover { background: #f1f5f9; }
        .text-red { color: #dc2626; font-weight: bold; }
        .text-green { color: #16a34a; font-weight: bold; }
        #tableStatus { margin-top: 10px; font-weight: bold; }
        
        /* 累計列的專屬樣式 */
        .total-row { background-color: #e2e8f0 !important; font-weight: bold; border-top: 2px solid #cbd5e1; }
        .total-row td:first-child { color: #1e293b; }
    </style>
</head>
<body>
    <h1>📈 台股 2330 籌碼數據儀表板</h1>
    
    <div class="card">
        <h2 class="card-title">🔍 歷史區間查詢</h2>
        <div class="form-group"><label>開始日期：</label><input type="date" id="startDate"></div>
        <div class="form-group"><label>結束日期：</label><input type="date" id="endDate"></div>
        <button onclick="fetchRangeData()">載入表格資料</button>
        
        <div id="tableStatus"></div>
        <div class="table-container" id="tableContainer">
            <p style="color: #94a3b8; text-align: center; margin-top: 20px;">請選擇區間並點擊載入，表格將顯示於此。</p>
        </div>
    </div>

    <script>
        function formatNumberColor(val) {
            if (!val || val === '-') return val;
            let num = parseFloat(String(val).replace(/,/g, ''));
            if (!isNaN(num)) {
                if (num > 0) return `<span class="text-red">${val}</span>`;
                if (num < 0) return `<span class="text-green">${val}</span>`;
            }
            return val;
        }

        async function fetchRangeData() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const container = document.getElementById('tableContainer');
            const statusDiv = document.getElementById('tableStatus');
            
            if (!start || !end) { statusDiv.innerHTML = "<span style='color:red;'>請選擇完整的開始與結束日期！</span>"; return; }
            if (start > end) { statusDiv.innerHTML = "<span style='color:red;'>開始日期不能大於結束日期！</span>"; return; }

            statusDiv.innerHTML = "資料載入中...";
            
            try {
                // 加上時間戳記避免快取
                const response = await fetch(`stock_data.json?t=${new Date().getTime()}`);
                const data = await response.json();
                
                // 🚀 修改 1：拿掉 .reverse()，讓日期由舊到新 (小到大) 排列
                let availableDates = Object.keys(data).filter(d => d >= start && d <= end).sort();
                
                if (availableDates.length === 0) {
                    statusDiv.innerHTML = `<span style='color:red;'>這個區間內沒有任何資料。(系統每日自動爬蟲，若有缺漏將於今日下午自動補齊)</span>`;
                    container.innerHTML = "";
                    return;
                }

                let allKeys = new Set();
                availableDates.forEach(d => {
                    Object.keys(data[d]).forEach(mainKey => {
                        // 🚀 修改 2：把 '交易日期' 也加入排除黑名單
                        if (mainKey === 'Stock ID' || mainKey === 'Error' || mainKey === '資料日期' || mainKey === '交易日期') return;
                        if (typeof data[d][mainKey] === 'object' && data[d][mainKey] !== null) {
                            Object.keys(data[d][mainKey]).forEach(subKey => {
                                if (subKey !== '資料日期' && subKey !== '交易日期') allKeys.add(subKey);
                            });
                        } else {
                            allKeys.add(mainKey);
                        }
                    });
                });
                const columns = Array.from(allKeys);

                // 🚀 準備計算機：為每個欄位建立一個加總變數
                let totals = {};
                columns.forEach(col => {
                    totals[col] = { sum: 0, isSummable: true };
                });

                let html = `<table><thead><tr><th>日期</th>`;
                columns.forEach(col => html += `<th>${col}</th>`);
                html += `</tr></thead><tbody>`;

                availableDates.forEach(date => {
                    html += `<tr><td>${date}</td>`;
                    let flatData = {};
                    
                    // 攤平資料
                    Object.keys(data[date]).forEach(k => {
                        if (typeof data[date][k] === 'object' && data[date][k] !== null) Object.assign(flatData, data[date][k]);
                        else flatData[k] = data[date][k];
                    });
                    
                    columns.forEach(col => {
                        let rawVal = flatData[col] !== undefined ? flatData[col] : '-';
                        html += `<td>${formatNumberColor(rawVal)}</td>`;
                        
                        // 🚀 累計邏輯：判斷這個欄位能不能加總
                        let strVal = String(rawVal).trim();
                        if (strVal === '-' || strVal.includes('%')) {
                            // 含有百分比或無資料的欄位，標記為不可加總
                            totals[col].isSummable = false;
                        } else {
                            let num = parseFloat(strVal.replace(/,/g, ''));
                            if (!isNaN(num)) {
                                totals[col].sum += num;
                            } else {
                                totals[col].isSummable = false;
                            }
                        }
                    });
                    html += `</tr>`;
                });

                // 🚀 修改 3：在最下方畫出「累計」列
                html += `<tr class="total-row"><td>累計</td>`;
                columns.forEach(col => {
                    if (totals[col].isSummable) {
                        // 將數字加上千分位逗號，並套用紅綠色
                        let formattedSum = totals[col].sum.toLocaleString('en-US');
                        html += `<td>${formatNumberColor(formattedSum)}</td>`;
                    } else {
                        html += `<td>-</td>`;
                    }
                });
                html += `</tr>`;

                html += `</tbody></table>`;
                
                container.innerHTML = html;
                statusDiv.innerHTML = `<span style='color:green;'>✅ 成功載入 ${availableDates.length} 筆資料！</span>`;
                
            } catch (error) {
                statusDiv.innerHTML = "<span style='color:red;'>讀取資料庫失敗。</span>";
            }
        }
    </script>
</body>
</html>
