<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股 2330 籌碼儀表板</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #334155;
            --border: #e2e8f0;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            padding: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        h1 { text-align: center; color: #1e293b; }
        
        .card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
        }
        .card-title { margin-top: 0; font-size: 1.2rem; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        
        .form-group { display: inline-block; margin-right: 15px; margin-bottom: 10px; }
        label { font-weight: bold; margin-right: 5px; font-size: 0.9rem;}
        input { padding: 8px; border: 1px solid var(--border); border-radius: 5px; outline: none; }
        input:focus { border-color: var(--primary); }
        button { 
            background: var(--primary); color: white; border: none; 
            padding: 9px 18px; border-radius: 5px; cursor: pointer; 
            font-weight: bold; transition: 0.2s; 
        }
        button:hover { background: #1d4ed8; }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; white-space: nowrap; }
        th, td { border: 1px solid var(--border); padding: 12px; text-align: right; }
        th { background: #f8fafc; color: #475569; text-align: center; font-weight: 600; }
        td:first-child { text-align: center; font-weight: bold; } 
        tr:nth-child(even) { background: #f8fafc; }
        tr:hover { background: #f1f5f9; }
        
        .text-red { color: #dc2626; font-weight: bold; }
        .text-green { color: #16a34a; font-weight: bold; }
        
        #statusMessage { color: #d9534f; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>📈 台股 2330 籌碼數據儀表板</h1>
    
    <div class="card">
        <h2 class="card-title">🔍 歷史區間查詢</h2>
        <div class="form-group">
            <label>開始日期：</label><input type="date" id="startDate">
        </div>
        <div class="form-group">
            <label>結束日期：</label><input type="date" id="endDate">
        </div>
        <button onclick="fetchRangeData()">載入表格資料</button>
        
        <div id="tableStatus" style="margin-top: 10px; font-weight: bold;"></div>
        <div class="table-container" id="tableContainer">
            <p style="color: #94a3b8; text-align: center; margin-top: 20px;">請選擇區間並點擊載入，表格將顯示於此。</p>
        </div>
    </div>

    <div class="card" style="background: #fffbeb; border: 1px solid #fde68a;">
        <h2 class="card-title" style="color: #d97706; border-bottom-color: #fde68a;">⚙️ 補齊缺漏資料 (單日爬蟲觸發器)</h2>
        <p style="font-size: 0.9rem; color: #92400e;">如果上方表格發現某天沒資料，請使用此工具單獨喚醒後端去抓取 (需等待 3-5 分鐘)。</p>
        
        <div class="form-group">
            <label>指定缺漏日期：</label><input type="date" id="singleDate">
        </div>
        <div class="form-group">
            <label>GitHub Token：</label>
            <input type="password" id="githubToken" placeholder="ghp_..." style="width: 200px;">
        </div>
        <button onclick="triggerBackend()" style="background: #ea580c;">啟動雲端爬蟲</button>
        <div id="statusMessage"></div>
    </div>

    <script>
        // ✅ 已經為您安全填寫完畢，請勿更動這裡的引號
        const GITHUB_USER = "ewq4303-debug"; 
        const GITHUB_REPO = "123";
        let pollingInterval;

        function formatNumberColor(val) {
            if (!val || val === '-') return val;
            let numStr = String(val).replace(/,/g, '');
            let num = parseFloat(numStr);
            
            if (!isNaN(num)) {
                if (num > 0) return `<span class="text-red">${val}</span>`;
                if (num < 0) return `<span class="text-green">${val}</span>`;
            }
            return val;
        }

        async function fetchRangeData() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const container = document.getElementById('tableContainer');
            const statusDiv = document.getElementById('tableStatus');
            
            if (!start || !end) { statusDiv.innerHTML = "<span style='color:red;'>請選擇完整的開始與結束日期！</span>"; return; }
            if (start > end) { statusDiv.innerHTML = "<span style='color:red;'>開始日期不能大於結束日期！</span>"; return; }

            statusDiv.innerHTML = "資料載入中...";
            
            try {
                const response = await fetch(`stock_data.json?t=${new Date().getTime()}`);
                const data = await response.json();
                
                let availableDates = Object.keys(data).filter(d => d >= start && d <= end).sort().reverse();
                
                if (availableDates.length === 0) {
                    statusDiv.innerHTML = `<span style='color:red;'>這個區間內沒有任何資料，請檢查日期或使用下方工具補抓。</span>`;
                    container.innerHTML = "";
                    return;
                }

                let allKeys = new Set();
                availableDates.forEach(d => {
                    Object.keys(data[d]).forEach(k => {
                        if(k !== '資料日期' && k !== 'Error') allKeys.add(k);
                    });
                });
                const columns = Array.from(allKeys);

                let html = `<table><thead><tr><th>日期</th>`;
                columns.forEach(col => html += `<th>${col}</th>`);
                html += `</tr></thead><tbody>`;

                availableDates.forEach(date => {
                    html += `<tr><td>${date}</td>`;
                    const rowData = data[date];
                    columns.forEach(col => {
                        let val = rowData[col] !== undefined ? rowData[col] : '-';
                        html += `<td>${formatNumberColor(val)}</td>`;
                    });
                    html += `</tr>`;
                });
                html += `</tbody></table>`;
                
                container.innerHTML = html;
                statusDiv.innerHTML = `<span style='color:green;'>✅ 成功載入 ${availableDates.length} 筆資料！</span>`;
                
            } catch (error) {
                statusDiv.innerHTML = "<span style='color:red;'>讀取資料庫失敗，請確認 stock_data.json 是否存在。</span>";
            }
        }

        async function triggerBackend() {
            const token = document.getElementById('githubToken').value;
            const rawDate = document.getElementById('singleDate').value; 
            const statusDiv = document.getElementById('statusMessage');
            
            if (!token || !rawDate) { alert("請輸入 Token 且選擇要補抓的日期！"); return; }

            const formattedDate = rawDate.replace(/-/g, '/');
            statusDiv.innerText = `🔄 正在要求 GitHub 抓取 ${formattedDate} 的資料...`;
            
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/actions/workflows/main.yml/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ ref: 'main', inputs: { target_date: formattedDate } })
                });

                if (response.ok) {
                    statusDiv.innerHTML = "🚀 <strong>爬蟲已啟動！</strong> 請等待約 3~5 分鐘... (網頁將自動偵測)";
                    let checkCount = 0;
                    pollingInterval = setInterval(() => {
                        checkCount++;
                        statusDiv.innerHTML = `⏳ 伺服器努力工作中... (已偵測 ${checkCount} 次)`;
                        if(document.getElementById('startDate').value) {
                            fetchRangeData();
                        }
                    }, 15000);
                } else {
                    const err = await response.json();
                    statusDiv.innerText = `❌ 啟動失敗：${err.message}`;
                }
            } catch (e) {
                console.error(e);
                statusDiv.innerText = "❌ 網路連線錯誤：" + e.message;
            }
        }
    </script>
</body>
</html>
